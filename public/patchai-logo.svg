<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="logo-shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5e452b">
        <animate attributeName="stop-color" values="#5e452b;#8b6914;#c49a3c;#5e452b" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#c49a3c">
        <animate attributeName="stop-color" values="#c49a3c;#5e452b;#8b6914;#c49a3c" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#5e452b">
        <animate attributeName="stop-color" values="#5e452b;#c49a3c;#5e452b;#8b6914" dur="3s" repeatCount="indefinite"/>
      </stop>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded square frame -->
  <rect x="4" y="4" width="40" height="40" rx="10" stroke="url(#logo-shimmer)" stroke-width="2.5" fill="none"/>

  <!-- Code brackets -->
  <path d="M16 16L11 24L16 32" stroke="url(#logo-shimmer)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M32 16L37 24L32 32" stroke="url(#logo-shimmer)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI center node -->
  <circle cx="24" cy="24" r="3.5" fill="url(#logo-shimmer)"/>

  <!-- Connection lines from center -->
  <line x1="20.5" y1="24" x2="17" y2="24" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27.5" y1="24" x2="31" y2="24" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Sparkle accents -->
  <line x1="24" y1="9" x2="24" y2="13" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="35" x2="24" y2="39" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="24" x2="13" y2="24" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="24" x2="39" y2="24" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Diagonal sparkles -->
  <line x1="11.5" y1="11.5" x2="14" y2="14" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36.5" y1="11.5" x2="34" y2="14" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11.5" y1="36.5" x2="14" y2="34" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36.5" y1="36.5" x2="34" y2="34" stroke="url(#logo-shimmer)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
