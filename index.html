    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PatchAI | The advanced AI coding assistant that goes beyond simple line completion. Identify logic errors and automatically generate fixes across your entire codebase." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Space+Grotesk:wght@300..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <title>PatchAI | Ship cleaner code. Automatically.</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('patchai-theme') || 'system';
          var resolved;
          if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else {
            resolved = theme;
          }
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {}
      })();
    </script>
